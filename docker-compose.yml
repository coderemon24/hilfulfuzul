version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: hilful_fuzul_app
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./backend-app:/var/www/html
    depends_on:
      - db
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public

  db:
    image: mysql:8.0
    container_name: hilful_fuzul_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-hilful_fuzul}
      MYSQL_USER: ${DB_USERNAME:-hilful_fuzul}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hilful_fuzul}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: hilful_fuzul_phpmyadmin
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-hilful_fuzul}
      PMA_PASSWORD: ${DB_PASSWORD:-hilful_fuzul}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
      
      
  node:
    image: node:22
    container_name: hilful_fuzul_node
    working_dir: /var/www/html
    volumes:
      - ./backend-app:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"

volumes:
  dbdata: